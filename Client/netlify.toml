[build]
  base = "Client"
  publish = "build"  
  command = "npm run build"

[[redirects]]
  from = "/api/*"
  to = "https://grocery-backend-coj7.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"